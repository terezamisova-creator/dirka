<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MATRIX BOT // v2.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #00ff41;
      --green-dim:   #00cc33;
      --green-dark:  #003b00;
      --green-faint: #001a00;
      --bg:          #000000;
      --panel:       #0a0a0a;
      --border:      #00ff4133;
      --text:        #00ee38;
      --mono:        'Share Tech Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      overflow: hidden;
    }

    /* ── Matrix Rain ── */
    #matrix-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.18;
      pointer-events: none;
    }

    /* ── Layout ── */
    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 12px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      font-size: 1.25rem;
      letter-spacing: .18em;
      color: var(--green);
      text-shadow: 0 0 12px var(--green);
    }
    .logo span { color: var(--green-dim); }
    .status {
      font-size: .72rem;
      color: var(--green-dim);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ── Knowledge bar ── */
    #knowledge-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 0;
      font-size: .7rem;
      color: var(--green-dim);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #knowledge-bar .kb-label { color: var(--green); letter-spacing:.1em; }
    .kb-tag {
      background: var(--green-faint);
      border: 1px solid var(--green-dark);
      color: var(--green-dim);
      padding: 2px 7px;
      border-radius: 2px;
      cursor: pointer;
      transition: background .2s;
    }
    .kb-tag:hover { background: var(--green-dark); color: var(--green); }
    #kb-count { margin-left: auto; color: #005500; }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--green-dark) transparent;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 2px; }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-width: 88%;
      animation: fadeIn .25s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end; }

    .msg-label {
      font-size: .65rem;
      letter-spacing: .1em;
      padding: 0 4px;
    }
    .msg.bot  .msg-label { color: #005500; }
    .msg.user .msg-label { color: #004400; text-align: right; }

    .bubble {
      padding: 10px 14px;
      line-height: 1.6;
      font-size: .88rem;
      border-radius: 2px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.bot .bubble {
      background: var(--green-faint);
      border: 1px solid var(--green-dark);
      border-left: 3px solid var(--green);
      color: var(--green);
      text-shadow: 0 0 8px #00ff4155;
    }
    .msg.user .bubble {
      background: #001200;
      border: 1px solid #003300;
      border-right: 3px solid var(--green-dim);
      color: var(--green-dim);
    }

    /* Typing indicator */
    .typing .bubble::after {
      content: '▌';
      animation: cursor .6s step-end infinite;
    }
    @keyframes cursor { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Input row ── */
    #input-area {
      padding: 10px 0 14px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    #prompt {
      flex: 1;
      background: #030f03;
      border: 1px solid var(--green-dark);
      color: var(--green);
      font-family: var(--mono);
      font-size: .88rem;
      padding: 10px 12px;
      resize: none;
      outline: none;
      border-radius: 2px;
      line-height: 1.5;
      min-height: 44px;
      max-height: 130px;
      transition: border-color .2s, box-shadow .2s;
    }
    #prompt:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 1px var(--green-dark), 0 0 14px #00ff4120;
    }
    #prompt::placeholder { color: #004400; }

    .btn {
      background: var(--green-faint);
      border: 1px solid var(--green-dark);
      color: var(--green-dim);
      font-family: var(--mono);
      font-size: .78rem;
      padding: 10px 14px;
      cursor: pointer;
      border-radius: 2px;
      letter-spacing: .1em;
      transition: background .15s, color .15s, box-shadow .15s;
      height: 44px;
      white-space: nowrap;
    }
    .btn:hover {
      background: var(--green-dark);
      color: var(--green);
      box-shadow: 0 0 8px #00ff4130;
    }
    .btn.primary {
      border-color: var(--green);
      color: var(--green);
    }
    .btn.primary:hover {
      background: #003300;
      box-shadow: 0 0 14px #00ff4140;
    }

    /* ── Learn modal ── */
    #learn-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000000cc;
      z-index: 10;
      align-items: center;
      justify-content: center;
    }
    #learn-overlay.open { display: flex; }
    #learn-box {
      background: #030f03;
      border: 1px solid var(--green);
      box-shadow: 0 0 40px #00ff4130;
      padding: 28px;
      width: min(520px, 95vw);
      border-radius: 2px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #learn-box h2 {
      font-size: 1rem;
      color: var(--green);
      letter-spacing: .15em;
      text-shadow: 0 0 10px var(--green);
    }
    #learn-box p { font-size: .78rem; color: #005500; line-height: 1.6; }
    #learn-key, #learn-val {
      background: #000;
      border: 1px solid var(--green-dark);
      color: var(--green);
      font-family: var(--mono);
      font-size: .85rem;
      padding: 9px 12px;
      border-radius: 2px;
      outline: none;
      width: 100%;
      transition: border-color .2s;
    }
    #learn-key:focus, #learn-val:focus { border-color: var(--green); }
    #learn-val { min-height: 80px; resize: vertical; }
    #learn-row { display: flex; gap: 8px; }
    #learn-feedback { font-size:.75rem; min-height:18px; }
    .ok  { color: var(--green); }
    .err { color: #ff3333; }

    /* ── Knowledge panel (sidebar toggle) ── */
    #kb-panel {
      display: none;
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: min(320px, 90vw);
      background: #020d02;
      border-left: 1px solid var(--green-dark);
      z-index: 9;
      flex-direction: column;
      padding: 16px;
      gap: 10px;
      overflow-y: auto;
    }
    #kb-panel.open { display: flex; }
    #kb-panel h3 {
      color: var(--green);
      font-size: .9rem;
      letter-spacing: .15em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    .kb-entry {
      background: var(--green-faint);
      border: 1px solid var(--green-dark);
      border-radius: 2px;
      padding: 8px 10px;
      font-size: .75rem;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .kb-entry .k { color: var(--green); }
    .kb-entry .v { color: var(--green-dim); }
    .kb-entry .del {
      align-self: flex-end;
      font-size: .65rem;
      color: #330000;
      cursor: pointer;
      margin-top: 4px;
    }
    .kb-entry .del:hover { color: #ff3333; }
    #kb-close {
      margin-top: auto;
    }
  </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div id="app">
  <header>
    <div class="logo">MATRIX<span>BOT</span> // <span>v2.0</span></div>
    <div class="status"><div class="dot"></div>ONLINE</div>
  </header>

  <div id="knowledge-bar">
    <span class="kb-label">ZNALOSTI:</span>
    <span id="kb-tags-inline"></span>
    <span id="kb-count">0 záznamů</span>
    <button class="btn" onclick="openKbPanel()">[ DATABÁZE ]</button>
    <button class="btn primary" onclick="openLearn()">[ + NAUČIT ]</button>
  </div>

  <div id="chat"></div>

  <div id="input-area">
    <div id="input-row">
      <textarea id="prompt" placeholder="> zadej zprávu..." rows="1"></textarea>
      <button class="btn primary" onclick="sendMessage()">ODESLAT</button>
    </div>
  </div>
</div>

<!-- Learn modal -->
<div id="learn-overlay">
  <div id="learn-box">
    <h2>// NOVÁ ZNALOST</h2>
    <p>Přidej botu novou informaci. Klíč je krátké jméno / téma, hodnota je cokoliv, co si má bot pamatovat.</p>
    <input id="learn-key" placeholder="klíč (např. moje jméno, oblíbená barva...)" maxlength="80" />
    <textarea id="learn-val" placeholder="hodnota (cokoliv, co si má bot pamatovat)"></textarea>
    <div id="learn-feedback"></div>
    <div id="learn-row">
      <button class="btn primary" onclick="saveLearn()">[ ULOŽIT ]</button>
      <button class="btn" onclick="closeLearn()">[ ZRUŠIT ]</button>
    </div>
  </div>
</div>

<!-- KB Panel -->
<div id="kb-panel">
  <h3>// ZNALOSTNÍ DATABÁZE</h3>
  <div id="kb-list"></div>
  <button class="btn" id="kb-close" onclick="closeKbPanel()">[ ZAVŘÍT ]</button>
</div>

<script>
// ─── Matrix Rain ──────────────────────────────────────────────
(function() {
  const c = document.getElementById('matrix-canvas');
  const ctx = c.getContext('2d');
  const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF<>{}[]|\\/-=+*%$#@!?';
  let cols, drops;

  function resize() {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    cols = Math.floor(c.width / 16);
    drops = Array.from({length: cols}, () => Math.random() * -50);
  }

  function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, 0, c.width, c.height);
    ctx.fillStyle = '#00ff41';
    ctx.font = '14px Share Tech Mono, monospace';
    for (let i = 0; i < cols; i++) {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillStyle = drops[i] < 2 ? '#afffbf' : '#00ff41';
      ctx.fillText(ch, i * 16, drops[i] * 16);
      if (drops[i] * 16 > c.height && Math.random() > 0.975) drops[i] = 0;
      drops[i] += 0.5;
    }
  }

  resize();
  window.addEventListener('resize', resize);
  setInterval(draw, 40);
})();

// ─── Knowledge base ───────────────────────────────────────────
const KB_KEY = 'matrixbot_kb';

function loadKB() {
  try { return JSON.parse(localStorage.getItem(KB_KEY)) || {}; } catch { return {}; }
}
function saveKB(kb) {
  localStorage.setItem(KB_KEY, JSON.stringify(kb));
  renderKbBar();
}

function renderKbBar() {
  const kb = loadKB();
  const keys = Object.keys(kb);
  document.getElementById('kb-count').textContent = keys.length + ' záznamů';
  const container = document.getElementById('kb-tags-inline');
  container.innerHTML = '';
  keys.slice(0, 5).forEach(k => {
    const tag = document.createElement('span');
    tag.className = 'kb-tag';
    tag.textContent = k;
    tag.title = kb[k];
    tag.onclick = () => {
      document.getElementById('prompt').value = 'Co víš o ' + k + '?';
      document.getElementById('prompt').focus();
    };
    container.appendChild(tag);
  });
  if (keys.length > 5) {
    const more = document.createElement('span');
    more.style.cssText = 'color:#004400;font-size:.68rem;';
    more.textContent = '+' + (keys.length - 5) + ' dalších';
    container.appendChild(more);
  }
}

function renderKbPanel() {
  const kb = loadKB();
  const list = document.getElementById('kb-list');
  list.innerHTML = '';
  const keys = Object.keys(kb);
  if (keys.length === 0) {
    list.innerHTML = '<p style="color:#003300;font-size:.75rem">Žádné záznamy. Nauč mě něco!</p>';
    return;
  }
  keys.forEach(k => {
    const div = document.createElement('div');
    div.className = 'kb-entry';
    div.innerHTML = `<span class="k">${escHtml(k)}</span><span class="v">${escHtml(kb[k])}</span><span class="del" onclick="deleteKb('${escHtml(k)}')">[ SMAZAT ]</span>`;
    list.appendChild(div);
  });
}

function deleteKb(key) {
  const kb = loadKB();
  delete kb[key];
  saveKB(kb);
  renderKbPanel();
  addMsg('bot', `Záznam "${key}" byl vymazán z databáze.`);
}

function openKbPanel() { renderKbPanel(); document.getElementById('kb-panel').classList.add('open'); }
function closeKbPanel() { document.getElementById('kb-panel').classList.remove('open'); }

// ─── Learn modal ──────────────────────────────────────────────
function openLearn() {
  document.getElementById('learn-key').value = '';
  document.getElementById('learn-val').value = '';
  document.getElementById('learn-feedback').textContent = '';
  document.getElementById('learn-overlay').classList.add('open');
  setTimeout(() => document.getElementById('learn-key').focus(), 50);
}
function closeLearn() { document.getElementById('learn-overlay').classList.remove('open'); }

function saveLearn() {
  const key = document.getElementById('learn-key').value.trim();
  const val = document.getElementById('learn-val').value.trim();
  const fb  = document.getElementById('learn-feedback');
  if (!key) { fb.className='err'; fb.textContent='Klíč nesmí být prázdný.'; return; }
  if (!val) { fb.className='err'; fb.textContent='Hodnota nesmí být prázdná.'; return; }
  const kb = loadKB();
  const existed = !!kb[key];
  kb[key] = val;
  saveKB(kb);
  fb.className = 'ok';
  fb.textContent = existed ? `Záznam "${key}" aktualizován.` : `Záznam "${key}" uložen.`;
  setTimeout(() => {
    closeLearn();
    addMsg('bot', `✓ Naučil jsem se novou informaci:\n[${key}] → ${val}`);
  }, 700);
}

// ─── Chat ─────────────────────────────────────────────────────
const chat = document.getElementById('chat');
let isTyping = false;

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addMsg(role, text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'bot' ? 'MATRIX_BOT' : 'YOU';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot typing';
  wrap.id = 'typing-msg';
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'MATRIX_BOT';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = '';
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function removeTyping() {
  const el = document.getElementById('typing-msg');
  if (el) el.remove();
}

// ─── Bot logic ────────────────────────────────────────────────
const GREETINGS = ['ahoj','nazdar','čus','zdravím','hello','hi','hei','hej','čaues'];
const FAREWELLS = ['nashle','čau','sbohem','bye','goodbye','hodně štěstí'];

function buildSystemContext(kb) {
  const keys = Object.keys(kb);
  if (keys.length === 0) return '';
  return '\n\nZnalostní databáze:\n' + keys.map(k => `- ${k}: ${kb[k]}`).join('\n');
}

async function getAIResponse(userMsg) {
  const kb = loadKB();
  const kbContext = buildSystemContext(kb);

  const systemPrompt = `Jsi Matrix Bot – inteligentní asistent s osobností inspirovanou filmem Matrix. Komunikuješ česky (nebo v jazyce uživatele). Jsi věcný, trochu tajemný a používáš terminologii z Matrixu (červená/modrá pilulka, Zion, Sentinelové, Agenti, apod.) – ale jen přirozeně, ne přehnaně. Pokud máš v databázi relevantní informaci, použij ji.${kbContext}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userMsg }]
      })
    });
    const data = await response.json();
    if (data.content && data.content[0] && data.content[0].text) {
      return data.content[0].text;
    }
    return 'Signál přerušen. Zkus to znovu.';
  } catch (e) {
    return 'Chyba připojení k Matrixu. Zkontroluj síť.';
  }
}

// Quick local commands before hitting API
function localResponse(msg) {
  const lower = msg.toLowerCase().trim();
  const kb = loadKB();

  // Greetings
  if (GREETINGS.some(g => lower === g || lower.startsWith(g + ' ') || lower.endsWith(' ' + g))) {
    return 'Zdravím, obyvateli reálného světa. O čem si dnes povíme?';
  }
  // Farewells
  if (FAREWELLS.some(f => lower.includes(f))) {
    return 'Nashledanou. Pamatuj – Matrix tě sleduje.';
  }
  // Co víš o X?
  const knowMatch = lower.match(/^(co víš o|řekni mi o|popiš)\s+(.+)\??$/i);
  if (knowMatch) {
    const topic = knowMatch[2].trim();
    const found = Object.keys(kb).find(k => k.toLowerCase().includes(topic) || topic.includes(k.toLowerCase()));
    if (found) return `Databáze: [${found}]\n${kb[found]}`;
  }
  // Explicit KB queries
  const kbMatch = Object.keys(kb).find(k => lower.includes(k.toLowerCase()));
  if (kbMatch) return `Z databáze: [${kbMatch}] → ${kb[kbMatch]}`;

  return null; // fall through to API
}

async function sendMessage() {
  if (isTyping) return;
  const ta = document.getElementById('prompt');
  const text = ta.value.trim();
  if (!text) return;
  ta.value = '';
  ta.style.height = 'auto';

  addMsg('user', text);

  // Check local shortcuts first
  const local = localResponse(text);
  if (local) {
    isTyping = true;
    const bubble = addTyping();
    await new Promise(r => setTimeout(r, 600 + Math.random() * 400));
    removeTyping();
    addMsg('bot', local);
    isTyping = false;
    return;
  }

  // AI response
  isTyping = true;
  const bubble = addTyping();
  const reply = await getAIResponse(text);
  removeTyping();
  addMsg('bot', reply);
  isTyping = false;

  // Auto-detect teach commands: "zapamatuj si / nauč se X je Y"
  const teachMatch = text.match(/^(?:zapamatuj si|nauč se|ulož)\s+[""']?(.+?)[""']?\s+(?:je|=|:|jsou|znamená)\s+(.+)$/i);
  if (teachMatch) {
    const key = teachMatch[1].trim();
    const val = teachMatch[2].trim();
    const kb = loadKB();
    kb[key] = val;
    saveKB(kb);
    setTimeout(() => addMsg('bot', `✓ Uloženo do databáze: [${key}] → ${val}`), 300);
  }
}

// ─── Auto-resize textarea ─────────────────────────────────────
const ta = document.getElementById('prompt');
ta.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 130) + 'px';
});
ta.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ─── Learn overlay keyboard ───────────────────────────────────
document.getElementById('learn-overlay').addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLearn();
  if (e.key === 'Enter' && e.ctrlKey) saveLearn();
});

// ─── Init ─────────────────────────────────────────────────────
renderKbBar();
setTimeout(() => {
  addMsg('bot', 'Systém online. Vítej v Matrixu.\n\nMůžeš se mnou chatovat, nebo mě naučit nové informace pomocí tlačítka [ + NAUČIT ].\n\nRychle nauč: napiš např. „zapamatuj si moje jméno je Jana"\n\nJakékoliv otázky? Jsem zde.');
}, 400);
</script>
</body>
</html>
